<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nilai Siswa</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #ffd6e7, #dbeafe);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 850px;
      background: white;
      border-radius: 28px;
      padding: 35px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 36px;
      color: #ff4d8d;
      margin-bottom: 10px;
    }

    .header p {
      color: #666;
      font-size: 14px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: 18px;
    }

    thead {
      background: #ff7eb3;
      color: white;
    }

    th,
    td {
      padding: 16px;
      text-align: center;
    }

    tbody tr {
      border-bottom: 1px solid #eee;
      transition: 0.3s ease;
    }

    tbody tr:hover {
      background: #fff0f6;
    }

    .badge {
      padding: 7px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      color: white;
    }

    .good {
      background: #22c55e;
    }

    .average {
      background: #f59e0b;
    }

    .excellent {
      background: #3b82f6;
    }

    .footer {
      margin-top: 30px;
      text-align: center;
    }

    .btn {
      display: inline-block;
      padding: 14px 28px;
      background: #ff4d8d;
      color: white;
      text-decoration: none;
      border-radius: 16px;
      font-weight: 600;
      transition: 0.3s ease;
    }

    .btn:hover {
      background: #e63e7c;
      transform: translateY(-2px);
    }

    @media (max-width: 600px) {
      .card {
        padding: 20px;
      }

      .header h1 {
        font-size: 28px;
      }

      th,
      td {
        padding: 12px;
        font-size: 13px;
      }
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="header">
      <h1>📚 Nilai Siswa</h1>
      <p>Data nilai siswa semester genap</p>
    </div>

    <table>
      <thead>
        <tr>
          <th>No</th>
          <th>Nama</th>
          <th>Kelas</th>
          <th>Nilai</th>
          <th>Status</th>
        </tr>
      </thead>

      <tbody>
        <tr>
          <td>01</td>
          <td>Adhan</td>
          <td>XI PPLG</td>
          <td>89</td>
          <td><span class="badge good">Baik</span></td>
        </tr>

        <tr>
          <td>02</td>
          <td>Marvel</td>
          <td>XI PPLG</td>
          <td>95</td>
          <td><span class="badge excellent">Excellent</span></td>
        </tr>

        <tr>
          <td>03</td>
          <td>Rizal</td>
          <td>XI PPLG</td>
          <td>60</td>
          <td><span class="badge average">Cukup</span></td>
        </tr>

        <tr>
          <td>04</td>
          <td>Rana</td>
          <td>Guru</td>
          <td>99</td>
          <td><span class="badge good">Excellent</span></td>
        </tr>
      </tbody>
    </table>G</s

    <div class="footer">
      <a href="beranda.html" class="btn">⬅ Kembali ke Beranda</a>
    </div>
  </div>

</body>
</html>
